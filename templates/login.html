<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Market Scout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p>Login to your account</p>
        <div id="error-message" class="message-box hidden error"></div>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn" class="auth-btn">Login</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="/register-view">Register</a></p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Logging in...';
            btn.disabled = true;

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            
            if (res.ok) {
                window.location.href = "/";
            } else {
                const errBox = document.getElementById('error-message');
                errBox.innerText = data.message;
                errBox.classList.remove('hidden');
                btn.innerText = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
