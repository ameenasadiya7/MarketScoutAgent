<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Market Scout Agent</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    
    <!-- Socket IO JS library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div class="app-container">
        
        <header>
            <div class="header-left">
                <h1>Market Scout Agent</h1>
                <p class="subtitle">AI-powered technical competitor updates</p>
            </div>
            <div class="header-right">
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </header>

        <main class="dashboard-grid">
            
            <!-- LEFT COLUMN: Search & Results -->
            <section class="main-section">
                
                <div class="search-section">
                    <form id="search-form" class="search-box">
                        <input type="text" id="company-input" placeholder="Enter a company name (e.g., Anthropic)" required autocomplete="off">
                        
                        <div class="date-picker-wrapper">
                            <label for="date-input">Prior to:</label>
                            <input type="date" id="date-input" title="Select a date to filter updates from up to 7 days prior">
                        </div>
                        
                        <button type="submit" id="search-btn">
                            <span>Search</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </button>
                    </form>
                </div>

                <div class="results-section">
                    <h2>Latest Technical Updates</h2>
                    
                    <div id="loading-spinner" class="spinner-container hidden">
                        <div class="spinner"></div>
                        <p>Scanning the web for recent updates...</p>
                    </div>

                    <div id="error-message" class="message-box hidden error"></div>
                    <div id="empty-message" class="message-box hidden empty"></div>

                    <div id="results-container" class="cards-grid">
                        <!-- Update Cards injected via JS -->
                    </div>
                </div>

            </section>

            <!-- RIGHT COLUMN: Insights / History / Favorites -->
            <aside class="sidebar-section">
                
                <div class="sidebar-card">
                    <h3>⭐ Favorite Companies</h3>
                    <ul id="favorites-list" class="sidebar-list">
                        <li class="empty-list-text">Loading favorites...</li>
                    </ul>
                </div>
                
                <div class="sidebar-card">
                    <h3>🕒 Recent Searches</h3>
                    <ul id="history-list" class="sidebar-list">
                        <li class="empty-list-text">Loading history...</li>
                    </ul>
                </div>

                <div class="sidebar-card trends-card">
                    <h3>📈 Industry Trends</h3>
                    <div id="trends-content" class="trends-content">
                        <div class="spinner small"></div>
                        <p>Analyzing recent market activity...</p>
                    </div>
                </div>

            </aside>

        </main>
        
        <footer>
            <div class="footer-content">
                <p>Market Scout Agent</p>
            </div>
        </footer>
    </div>
    
    <!-- Notification Toast Container -->
    <div id="notification-container" class="notification-container"></div>
    
    <script src="/static/script.js"></script>
</body>
</html>
